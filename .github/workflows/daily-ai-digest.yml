name: Daily AI Digest to Slack

on:
  schedule:
    # 09:00 Singapore/China time = 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-ai-digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    environment: PaperDigest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest job
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || secrets.DEEPSEEK_MODEL || 'deepseek-chat' }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
          DIGEST_CONFIG: ${{ vars.DIGEST_CONFIG || secrets.DIGEST_CONFIG || 'config/domains.json' }}
          TIMEZONE: ${{ vars.TIMEZONE || secrets.TIMEZONE || 'Asia/Singapore' }}
          ARXIV_MAX_RESULTS: ${{ vars.ARXIV_MAX_RESULTS || secrets.ARXIV_MAX_RESULTS || '2000' }}
          ARXIV_PAGE_SIZE: ${{ vars.ARXIV_PAGE_SIZE || secrets.ARXIV_PAGE_SIZE || '200' }}
          ARXIV_REQUEST_DELAY_SECONDS: ${{ vars.ARXIV_REQUEST_DELAY_SECONDS || secrets.ARXIV_REQUEST_DELAY_SECONDS || '3.5' }}
          ARXIV_RETRIES: ${{ vars.ARXIV_RETRIES || secrets.ARXIV_RETRIES || '6' }}
          ARXIV_RETRY_BASE_SECONDS: ${{ vars.ARXIV_RETRY_BASE_SECONDS || secrets.ARXIV_RETRY_BASE_SECONDS || '20' }}
          ARXIV_RETRY_MAX_SECONDS: ${{ vars.ARXIV_RETRY_MAX_SECONDS || secrets.ARXIV_RETRY_MAX_SECONDS || '300' }}
          ARXIV_TIMEOUT_SECONDS: ${{ vars.ARXIV_TIMEOUT_SECONDS || secrets.ARXIV_TIMEOUT_SECONDS || '120' }}
          ARXIV_USER_AGENT: ${{ vars.ARXIV_USER_AGENT || secrets.ARXIV_USER_AGENT || 'PaperDigest/1.0' }}
          HF_MAX_RESULTS: ${{ vars.HF_MAX_RESULTS || secrets.HF_MAX_RESULTS || '80' }}
          HF_MAX_PER_DOMAIN: ${{ vars.HF_MAX_PER_DOMAIN || secrets.HF_MAX_PER_DOMAIN || '100' }}
          ANALYSIS_MAX_PAPERS: ${{ vars.ANALYSIS_MAX_PAPERS || secrets.ANALYSIS_MAX_PAPERS || '40' }}
          DOMAIN_WORKERS: ${{ vars.DOMAIN_WORKERS || secrets.DOMAIN_WORKERS || '4' }}
          REPORT_DIR: reports
          DISABLE_LLM: ${{ vars.DISABLE_LLM || secrets.DISABLE_LLM || '0' }}
          UPDATE_ARCHIVE: ${{ vars.UPDATE_ARCHIVE || '1' }}
          ARCHIVE_DIR: archive
          DAILY_FILE_NAME: ${{ vars.DAILY_FILE_NAME || 'daily-ai-paper-digest.md' }}
          SLACK_RETRIES: ${{ vars.SLACK_RETRIES || secrets.SLACK_RETRIES || '4' }}
          SLACK_RETRY_BASE_SECONDS: ${{ vars.SLACK_RETRY_BASE_SECONDS || secrets.SLACK_RETRY_BASE_SECONDS || '3' }}
          SLACK_RETRY_MAX_SECONDS: ${{ vars.SLACK_RETRY_MAX_SECONDS || secrets.SLACK_RETRY_MAX_SECONDS || '60' }}
          LLM_WORKERS: ${{ vars.LLM_WORKERS || secrets.LLM_WORKERS || '1' }}
          LLM_RETRIES: ${{ vars.LLM_RETRIES || secrets.LLM_RETRIES || '3' }}
          LLM_RETRY_BASE_SECONDS: ${{ vars.LLM_RETRY_BASE_SECONDS || secrets.LLM_RETRY_BASE_SECONDS || '8' }}
          LLM_RETRY_MAX_SECONDS: ${{ vars.LLM_RETRY_MAX_SECONDS || secrets.LLM_RETRY_MAX_SECONDS || '90' }}
          LLM_JSON_RETRIES: ${{ vars.LLM_JSON_RETRIES || secrets.LLM_JSON_RETRIES || '2' }}
        run: python scripts/daily_ai_digest.py

      - name: Commit archive updates
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archive
          if git diff --cached --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi
          git commit -m "Update daily paper archive"
          for attempt in 1 2 3; do
            git pull --rebase origin "${GITHUB_REF_NAME}"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Upload paper reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-ai-paper-reports
          path: reports
          if-no-files-found: ignore
